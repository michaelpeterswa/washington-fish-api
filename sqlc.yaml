version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/store/migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "db"
        out: "internal/store/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          # PostGIS geometry isn't a core PG type; hand it back as raw bytes
          # (EWKB) and let the store layer wrap ST_* helpers around it. Revisit
          # in phase 2 with the first spatial query.
          - db_type: "geometry"
            go_type: "string"
# NOTE: `sqlc generate` is run starting in phase 2, once internal/store/queries
# holds real queries. The migrations schema above is the source of truth.
